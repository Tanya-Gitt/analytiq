# Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec
#
# One service (free tier):
#   analytiq-api  — FastAPI REST + WebSocket
#
# Background worker (APScheduler) requires Render's paid plan.
# For the demo the API works fully without it.
#
# Database: Neon.tech (https://neon.tech) — free PostgreSQL, no credit card.
# Frontend: Vercel (https://vercel.com) — free Next.js hosting.

services:

  # ── FastAPI web service ──────────────────────────────────────────────────────
  - type: web
    name: analytiq-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/migrate.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://analytiq-phi.vercel.app
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
