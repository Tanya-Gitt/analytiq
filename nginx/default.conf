# Rate limiting zones (http context - included inside http{} from nginx.conf)
# auth_limit : 5 req/min per IP - brute force protection on login/signup
# ingest_limit: 200 req/min per IP - generous limit for SDK event batches
limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=ingest_limit:10m  rate=200r/m;

server {
    listen 80;
    listen [::]:80;

    # Allow up to 12 MB bodies (CSV upload capped at 10 MB in app code as 2nd layer)
    client_max_body_size 12m;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy
    # Allows same-origin scripts/styles, data: and blob: images, inline styles
    # (Recharts needs unsafe-inline for SVG styles). Blocks framing from any origin.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # HSTS - uncomment once TLS is configured in production.
    # Enabling over plain HTTP will lock users out.
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Auth endpoints - rate limited to 5 req/min per IP (brute force protection)
    # Must come before the generic /api/ block (nginx picks the most specific match)
    location ~ ^/api/auth/(login|signup)$ {
        limit_req        zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # GoTrue /token endpoint - same rate limit
    # Prefix match (not regex) so proxy_pass URI is allowed
    location /auth/token {
        limit_req        zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://auth:9999/token;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
    }

    # SSE stream endpoint — must come before the generic /api/ block.
    # proxy_buffering off: flush each SSE frame immediately instead of
    # accumulating into nginx's buffer (which causes "network error" on the client).
    # proxy_read_timeout 3600s: SSE connections are long-lived; 60 s would kill them.
    # Connection '': let nginx keep the upstream connection open (HTTP/1.1 keep-alive).
    location /api/stream/ {
        proxy_pass              http://app:8000;
        proxy_http_version      1.1;
        proxy_set_header        Host             $host;
        proxy_set_header        X-Real-IP        $remote_addr;
        proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header        Connection       '';
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        chunked_transfer_encoding on;
    }

    # FastAPI backend (API + SDK static files)
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # JS SDK static files served by FastAPI StaticFiles mount
    location /sdk/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        add_header         Cache-Control "public, max-age=3600";
    }

    # Supabase GoTrue auth (catch-all for /auth/*)
    location /auth/ {
        proxy_pass         http://auth:9999/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
    }

    # Next.js frontend (catch-all)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        # WebSocket support for Next.js HMR in dev
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
    }
}
