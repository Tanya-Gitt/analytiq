server {
    listen 80;
    listen [::]:80;

    # Allow up to 50 MB request bodies (CSV uploads, webhook batches)
    client_max_body_size 50m;

    # FastAPI backend  (API + SDK static files)
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # JS SDK static files served by FastAPI's StaticFiles mount
    location /sdk/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # Long cache for the SDK (content-addressed releases should bump the filename)
        proxy_cache_valid  200 1h;
        add_header         Cache-Control "public, max-age=3600";
    }

    # Supabase GoTrue auth
    location /auth/ {
        proxy_pass         http://auth:9999/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # Next.js frontend (catch-all)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # WebSocket support for Next.js HMR in dev
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
