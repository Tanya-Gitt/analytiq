# Unified Analytics Platform — 6-service stack
# One process per container. nginx routes:
#   /api/*   → app:8000  (FastAPI)
#   /sdk/*   → app:8000  (JS SDK static files, served by FastAPI StaticFiles)
#   /auth/*  → auth:9999 (Supabase GoTrue)
#   /*       → frontend:3000 (Next.js)

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Used by 02_app_user.sh to create the least-privilege app_user login role
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_app_user.sh:/docker-entrypoint-initdb.d/02_app_user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    # SECURITY: Do NOT expose 5432 to 0.0.0.0 in production.
    # For local development only — comment out or bind to 127.0.0.1.
    # In production, remove this entirely; the app connects via internal Docker network.
    ports:
      - "127.0.0.1:5432:5432"   # local dev only — bound to loopback, not 0.0.0.0

  # ── Supabase GoTrue (auth) ────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.143.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://analytics:${POSTGRES_PASSWORD}@postgres:5432/analytics
      GOTRUE_SITE_URL: http://localhost
      API_EXTERNAL_URL: http://localhost          # required by GoTrue v2.143+
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 86400
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      # SMTP (optional — comment out if not using email confirmation)
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: Analytics Platform
      GOTRUE_MAILER_AUTOCONFIRM: "true"   # disable email confirmation for MVP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # app_user is a least-privilege role (member of app_role).
      # It cannot bypass RLS, drop tables, or create roles.
      # The analytics superuser is only used for schema init and GoTrue migrations.
      DATABASE_URL: postgresql://app_user:${APP_DB_PASSWORD}@postgres:5432/analytics
      JWT_SECRET: ${JWT_SECRET}
      # Comma-separated origins allowed to call /api/* from a browser.
      # Add your production domain here, e.g. https://analytics.mycompany.com
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
    healthcheck:
      # python:3.12-slim has no wget/curl; use stdlib urllib instead
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=4)"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: /api
    # No health check — Next.js standalone starts in ~100 ms and nginx's
    # upstream_tries handles any brief startup gap gracefully.

  # ── APScheduler (connector syncs + alert evaluation) ─────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy   # ensures schema is applied before scheduler starts
    environment:
      DATABASE_URL: postgresql://app_user:${APP_DB_PASSWORD}@postgres:5432/analytics
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

  # ── nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started   # frontend has no health check — starts in ~100 ms
      auth:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
